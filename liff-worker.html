<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/><title>กรอกข้อมูลฟาร์ม</title><script src="https://cdn.tailwindcss.com"></script><script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script></head>
<body class="min-h-screen bg-emerald-50 text-slate-900 px-4 py-5"><main class="mx-auto w-full max-w-md rounded-3xl bg-white shadow-xl p-5"><header class="mb-5 text-center"><p id="routeBadge" class="text-xs font-semibold text-emerald-600">กำลังโหลดลิงก์...</p><h1 class="text-2xl font-extrabold text-emerald-700">บันทึกไข่ / ส่ง PreBill</h1><p id="batchName" class="mt-1 text-sm text-slate-500">-</p></header><form id="liffWorkerForm" class="space-y-4"><div><label class="font-semibold">วันที่บันทึก</label><input id="logDate" type="date" required class="mt-1 w-full rounded-xl border p-3 text-base"/></div><section class="rounded-2xl bg-slate-50 p-3 space-y-3"><h2 class="font-bold text-slate-700">จำนวนไข่วันนี้</h2><div class="grid grid-cols-2 gap-3"><input id="qty_all" type="number" min="0" step="1" placeholder="ไข่รวม" class="rounded-xl border p-3 text-base"/><input id="qty_cracked" type="number" min="0" step="1" placeholder="ไข่บุบ" class="rounded-xl border p-3 text-base"/><input id="qty_big" type="number" min="0" step="1" placeholder="ไข่ใหญ่/แฝด" class="rounded-xl border p-3 text-base"/><input id="qty_small" type="number" min="0" step="1" placeholder="ไข่เล็ก" class="rounded-xl border p-3 text-base"/><input id="qty_broken" type="number" min="0" step="1" placeholder="ไข่แตก" class="rounded-xl border p-3 text-base"/><input id="qty_remain" type="number" min="0" step="1" placeholder="ไข่คงเหลือ/เศษ" class="rounded-xl border p-3 text-base"/></div></section><section class="rounded-2xl bg-amber-50 p-3 space-y-3"><h2 class="font-bold text-amber-700">ส่งขาย / PreBill</h2><input id="buyer" type="text" placeholder="ชื่อผู้ซื้อ (ไม่บังคับ)" class="w-full rounded-xl border p-3 text-base"/><textarea id="rawMessage" rows="4" placeholder="เช่น&#10;23.9=6ตั้ง&#10;23.8=1ตั้ง&#10;ศ.23.6=3แผง&#10;บุบ=99ฟอง" class="w-full rounded-xl border p-3 text-lg"></textarea><p id="priceNote" class="text-xs text-slate-500">ราคาจะอ้างอิงจากชุดราคาที่ผูกกับ batch</p></section><button id="submitBtn" type="submit" class="w-full rounded-xl bg-emerald-600 py-3 font-bold text-white active:scale-[.99]">บันทึกข้อมูล</button><p id="statusText" class="text-center text-sm text-slate-500"></p></form></main><script src="js/config.js"></script><script src="js/core/api.js"></script><script src="js/modules/liff-worker.js"></script></body></html>
