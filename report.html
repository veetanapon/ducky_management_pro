<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Report | Ducky Management Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="module_calendar" data-module="report">
  <header class="app-header container">
    <div class="header-leading">
      <button class="icon-btn hamburger-btn" data-nav-toggle type="button" aria-label="open menu">☰</button>
      <div>
        <h1 id="moduleTitle">รายงาน</h1>
        <p class="muted" id="moduleSubtitle">กำลังโหลดข้อมูล...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="backBtn" type="button">←</button>
      <button class="icon-btn" id="logoutBtn" type="button">⎋</button>
    </div>
  </header>

  <main class="container page-body module-page-layout">
    <section class="card-panel module-page-intro">
      <div class="section-card-head">
        <h3>ภาพรวมรายงาน</h3>
        <span class="badge-inline muted-badge" id="modulePermissionBadge">กำลังโหลด</span>
      </div>
      <p class="muted" id="moduleHint">กำลังโหลดข้อมูลสรุป...</p>
    </section>

    <section id="moduleSummaryCards" class="module-summary-grid"></section>

    <section class="card-panel module-calendar-panel">
      <div class="section-card-head">
        <h3 id="calendarTitle">ปฏิทินการบันทึก</h3>
        <div class="module-calendar-nav">
          <button type="button" class="secondary-btn calendar-nav-btn" id="calendarPrevBtn">‹</button>
          <span class="badge-inline muted-badge" id="calendarMonthLabel">-</span>
          <button type="button" class="secondary-btn calendar-nav-btn" id="calendarNextBtn">›</button>
        </div>
      </div>
      <div class="module-calendar-legend">
        <span><i class="legend-swatch legend-swatch--filled"></i> มีบันทึก</span>
        <span><i class="legend-swatch legend-swatch--empty"></i> ยังไม่บันทึก</span>
      </div>
      <div class="module-calendar-weekdays">
        <span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span>
      </div>
      <div id="moduleCalendarGrid" class="module-calendar-grid"></div>
    </section>

    <section class="card-panel">
      <div class="section-card-head">
        <h3>บันทึกล่าสุด</h3>
        <span class="badge-inline muted-badge" id="recentCountBadge">0 รายการ</span>
      </div>
      <div id="recentLogList" class="log-list"></div>
    </section>
  </main>

  <div id="moduleFabRoot"></div>

  <script src="js/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/modules/nav.js"></script>
  <script src="js/modules/module-calendar-page.js"></script>
  <script src="js/core/zoom-lock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
