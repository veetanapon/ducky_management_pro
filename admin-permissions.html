<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Permissions | Ducky Management Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="admin_permissions">
  <header class="app-header container">
    <div class="header-leading">
      <button class="icon-btn hamburger-btn" data-nav-toggle type="button" aria-label="open menu">☰</button>
      <div>
        <h1>กำหนดสิทธิ์ผู้ใช้</h1>
        <p class="muted" id="adminPermissionSubtitle">เลือก user และ batch เพื่อกำหนดสิทธิ์รายโมดูล</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="backBtn" type="button">←</button>
      <button class="icon-btn" id="logoutBtn" type="button">⎋</button>
    </div>
  </header>

  <main class="container page-body module-page-layout">
    <section class="card-panel access-page-card">
      <div class="section-card-head">
        <h3>เลือกเป้าหมาย</h3>
        <span class="badge-inline success" id="adminPermissionRoleBadge">admin</span>
      </div>
      <form id="adminPermissionForm" class="form-stack">
        <label class="field-label">เลือก batch</label>
        <input type="search" id="adminBatchSearch" list="adminBatchList" placeholder="ค้นหาชื่อ batch" required />
        <datalist id="adminBatchList"></datalist>

        <label class="field-label">เลือกผู้ใช้</label>
        <input type="search" id="adminUserSearch" list="adminUserList" placeholder="ค้นหาด้วย email หรือชื่อฟาร์ม" required />
        <datalist id="adminUserList"></datalist>

        <div id="adminPermissionMatrix" class="permission-card-grid permission-card-grid--3">
          <div class="empty-state">เลือก batch และ user ก่อนเพื่อแสดงสิทธิ์รายโมดูล</div>
        </div>

        <div class="access-action-row">
          <button type="button" class="secondary-btn" id="adminLoadGrantedBtn">แสดงรายชื่อผู้มีสิทธิ์</button>
          <button type="submit" id="adminPermissionSaveBtn">บันทึกสิทธิ์ทั้งหมด</button>
        </div>
      </form>
    </section>

    <section class="card-panel access-page-card">
      <div class="section-card-head">
        <h3>รายชื่อผู้มีสิทธิ์ใน batch ที่เลือก</h3>
        <span class="badge-inline muted-badge" id="adminGrantedCountBadge">ยังไม่โหลด</span>
      </div>
      <p class="muted" id="adminGrantedHint">กดปุ่ม “แสดงรายชื่อผู้มีสิทธิ์” เพื่อดึงข้อมูลจากชีทเมื่อจำเป็น</p>
      <div id="adminGrantedList" class="access-member-list is-idle">
        <div class="empty-state">ยังไม่ได้ดึงข้อมูล</div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/modules/nav.js"></script>
  <script src="js/modules/admin-permissions-page.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
