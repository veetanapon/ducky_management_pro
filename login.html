<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Ducky Management Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <main class="container">
    <section class="sheet-panel login-panel">
      <div class="sheet-header">
        <span>เข้าสู่ระบบ</span>
      </div>
      <form id="loginForm" class="sheet-body">
        <p class="muted">กรอกอีเมลเพื่อเข้าใช้งาน</p>
        <input type="email" id="email" placeholder="your@email.com" required />
        <input type="text" id="deviceName" placeholder="ชื่ออุปกรณ์ (ไม่บังคับ)" />
        <button id="submitLogin" type="submit">เข้าสู่ระบบ</button>
        <p id="status" class="muted"></p>
      </form>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      AppAuth.bootstrapLoginPage();
    });
  </script>
</body>
</html>
