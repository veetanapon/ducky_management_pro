<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Ducky Management Pro</title>
  <link rel="stylesheet" href="css/core/app.css" />
  <link rel="stylesheet" href="css/modules/index.css" />
</head>
<body data-page="index">
  <header class="app-header container">
    <div class="header-leading">
      <button class="icon-btn hamburger-btn" data-nav-toggle type="button" aria-label="open menu">☰</button>
      <div>
        <h1>My Batch Lists</h1>
        <p class="muted" id="pageSubtitle">รายการชุดสัตว์ที่เข้าถึงได้</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" type="button" title="รีเฟรช">↻</button>
      <button class="icon-btn" id="logoutBtn" type="button" title="ออกจากระบบ">⎋</button>
    </div>
  </header>

  <main class="container page-body">
    <section class="search-bar">
      <input id="batchSearch" type="search" placeholder="ค้นหาชื่อชุดสัตว์..." />
    </section>

    <section id="offlineBanner" class="banner warning hidden">
      กำลังแสดงข้อมูลจากเครื่อง อาจยังไม่เป็นข้อมูลล่าสุด
    </section>

    <section id="batchLists" class="batch-list"></section>
  </main>

  <button class="fab" id="fabMain" type="button" aria-label="actions">＋</button>
  <div id="fabMenu" class="fab-menu hidden"></div>

  <div id="addSheet" class="sheet hidden" aria-hidden="true">
    <div class="sheet-backdrop" data-close-sheet></div>
    <div class="sheet-panel">
      <div class="sheet-header">
        <span id="sheetTitle">เพิ่มชุดสัตว์ใหม่</span>
        <button id="closeSheetBtn" type="button" class="icon-btn">×</button>
      </div>
      <form id="batchForm" class="sheet-body">
        <input id="ab_species" list="speciesList" placeholder="ชนิดสัตว์" required />
        <datalist id="speciesList">
          <option value="เป็ด"></option>
          <option value="ปลา"></option>
        </datalist>

        <input id="ab_name" placeholder="ชื่อชุดสัตว์" required />
        <div class="grid-2">
          <input id="ab_initqty" type="number" min="0" step="1" placeholder="จำนวนเริ่มต้น" />
          <input id="ab_currqty" type="number" min="0" step="1" placeholder="จำนวนปัจจุบัน" />
        </div>
        <input id="ab_unitprice" type="number" min="0" step="0.01" placeholder="ราคาต่อหน่วย" />

        <div class="grid-2">
          <select id="ab_status">
            <option value="1">Active</option>
            <option value="0">Inactive</option>
          </select>
          <input id="ab_startDate" type="date" />
        </div>

        <input id="ab_endDate" type="date" />
        <textarea id="ab_remark" rows="3" placeholder="หมายเหตุเพิ่มเติม"></textarea>

        <label class="upload">
          <span>📷 เลือกรูป</span>
          <input type="file" id="batchImage" accept="image/*" />
        </label>

        <img id="imagePreview" class="image-preview hidden" alt="preview" />
        <button id="submitBatchBtn" type="submit">บันทึกข้อมูล</button>
      </form>
    </div>
  </div>

  <template id="batchCardTemplate">
    <article class="swipe-wrap">
      <div class="swipe-actions">
        <button class="swipe-btn edit" type="button" data-action="edit">✎</button>
        <button class="swipe-btn delete" type="button" data-action="delete">🗑</button>
      </div>
      <div class="batch-card compact swipe-content">
        <div class="batch-thumb"><img alt="" /></div>
        <div class="batch-info">
          <div class="batch-header-row">
            <span class="batch-title"></span>
            <span class="batch-subtitle"></span>
          </div>
          <div class="batch-stats-row">
            <div class="batch-stat">
              <span class="label js-start"></span>
              <span class="value js-current"></span>
            </div>
            <div class="batch-stat text-right">
              <span class="label js-right-label"></span>
              <span class="value js-right-value"></span>
            </div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="js/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/dom.js"></script>
  <script src="js/core/format.js"></script>
  <script src="js/core/image.js"></script>
  <script src="js/services/batch.service.js"></script>
  <script src="js/services/feed.service.js"></script>
  <script src="js/services/egg.service.js"></script>
  <script src="js/services/sale.service.js"></script>
  <script src="js/services/price.service.js"></script>
  <script src="js/services/permission.service.js"></script>
  <script src="js/services/report.service.js"></script>
  <script src="js/services/liff.service.js"></script>
  <script src="js/services/event.service.js"></script>
  <script src="js/components/bottom-sheet.js"></script>
  <script src="js/components/calendar-grid.js"></script>
  <script src="js/components/summary-cards.js"></script>
  <script src="js/components/skeleton.js"></script>
  <script src="js/components/fab.js"></script>
  <script src="js/components/bill-preview.js"></script>
  <script src="js/modules/nav.js"></script>
  <script src="js/modules/forms.js"></script>
  <script src="js/modules/index-page.js"></script>
  <script src="js/core/zoom-lock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
