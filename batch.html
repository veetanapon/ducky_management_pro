<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Batch Dashboard | Ducky Management Pro</title>
  <link rel="stylesheet" href="css/core/app.css" />
  <link rel="stylesheet" href="css/modules/batch-dashboard.css" />
</head>
<body data-page="batch_dashboard">
  <header class="app-header container">
    <div class="header-leading">
      <button class="icon-btn hamburger-btn" data-nav-toggle type="button" aria-label="open menu">☰</button>
      <div>
        <h1 id="batchTitle">Batch Dashboard</h1>
        <p class="muted" id="batchSubtitle">กำลังโหลดข้อมูล...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="backBtn" type="button">←</button>
      <button class="icon-btn" id="logoutBtn" type="button">⎋</button>
    </div>
  </header>

  <main class="container page-body batch-dashboard-layout">
    <section class="detail-hero card-panel batch-dashboard-hero">
      <img id="batchHeroImage" class="hero-image" alt="batch image" />
      <div class="hero-meta hero-meta-grid">
        <div><strong>ชนิด:</strong> <span id="batchSpecie"></span></div>
        <div><strong>สถานะ:</strong> <span id="batchStatus"></span></div>
        <div><strong>สิทธิ์:</strong> <span id="batchPermission"></span></div>
        <div><strong>ช่วงเลี้ยง:</strong> <span id="batchDates"></span></div>
        <div><strong>คงเหลือ:</strong> <span id="batchHeroQty"></span></div>
        <div><strong>ราคาอ้างอิง:</strong> <span id="batchHeroPrice"></span></div>
      </div>
      <p id="batchRemark" class="muted"></p>
    </section>

    <section class="card-panel module-intro-card">
      <div class="section-card-head">
        <h3>ภาพรวมโมดูล</h3>
        <span class="badge-inline success">โหลดแบบสรุป</span>
      </div>
      <p class="muted">เลือกเมนูเพื่อเข้าไปจัดการ batch นี้ได้ทันที</p>
    </section>

    <section id="moduleCards" class="module-card-grid module-card-grid--menu"></section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/dom.js"></script>
  <script src="js/core/format.js"></script>
  <script src="js/core/image.js"></script>
  <script src="js/services/batch.service.js"></script>
  <script src="js/services/feed.service.js"></script>
  <script src="js/services/egg.service.js"></script>
  <script src="js/services/sale.service.js"></script>
  <script src="js/services/price.service.js"></script>
  <script src="js/services/permission.service.js"></script>
  <script src="js/services/report.service.js"></script>
  <script src="js/services/liff.service.js"></script>
  <script src="js/services/event.service.js"></script>
  <script src="js/components/bottom-sheet.js"></script>
  <script src="js/components/calendar-grid.js"></script>
  <script src="js/components/summary-cards.js"></script>
  <script src="js/components/skeleton.js"></script>
  <script src="js/components/fab.js"></script>
  <script src="js/components/bill-preview.js"></script>
  <script src="js/modules/nav.js"></script>
  <script src="js/modules/batch-dashboard.js"></script>
  <script src="js/core/zoom-lock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
