<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>จัดการลิงก์ LIFF | Ducky Management Pro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="liff_routes">
  <header class="app-header container">
    <div class="header-leading">
      <button class="icon-btn hamburger-btn" data-nav-toggle type="button" aria-label="open menu">☰</button>
      <div>
        <h1>จัดการลิงก์ LIFF</h1>
        <p class="muted" id="liffRoutesSubtitle">กำลังโหลดข้อมูล...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="backBtn" type="button">←</button>
      <button class="icon-btn" id="logoutBtn" type="button">⎋</button>
    </div>
  </header>

  <main class="container page-body module-page-layout">
    <section class="card-panel module-page-intro">
      <div class="section-card-head">
        <h3>ลิงก์สำหรับลูกน้องกรอกข้อมูล</h3>
        <span class="badge-inline muted-badge" id="liffRoutesPermissionBadge">กำลังโหลด</span>
      </div>
      <p class="muted" id="liffRoutesHint">ใช้ route_key ผูกลิงก์ LIFF เข้ากับ batch นี้ เพื่อไม่ให้ลูกน้องเลือก batch เอง</p>
    </section>

    <section class="card-panel" id="liffRouteEditorCard">
      <div class="section-card-head">
        <h3 id="liffRouteEditorTitle">สร้างลิงก์ใหม่</h3>
        <button type="button" class="secondary-btn small-btn" id="newLiffRouteBtn">เริ่มใหม่</button>
      </div>
      <form id="liffRouteForm" class="form-stack">
        <input type="hidden" id="liffRouteId" />
        <label class="field-label">ชื่อ/คำอธิบายลิงก์</label>
        <input type="text" id="liffRouteName" placeholder="เช่น โรงเรือนเป็ด 1 / กลุ่มลูกน้องเช้า" required />
        <label class="field-label">route_key</label>
        <div class="grid-2">
          <input type="text" id="liffRouteKey" placeholder="rt_xxxxxxxxxxxxxxxx" required />
          <button type="button" class="secondary-btn" id="generateRouteKeyBtn">สุ่ม key</button>
        </div>
        <label class="field-label">หมายเหตุ</label>
        <textarea id="liffRouteRemark" rows="2" placeholder="optional"></textarea>
        <label class="field-label"><input type="checkbox" id="liffRouteActive" checked /> เปิดใช้งานลิงก์นี้</label>
        <button type="submit" id="saveLiffRouteBtn">บันทึกลิงก์</button>
      </form>
    </section>

    <section class="card-panel">
      <div class="section-card-head">
        <h3>ลิงก์ที่ผูกกับ batch นี้</h3>
        <span class="badge-inline muted-badge" id="liffRouteCountBadge">0 รายการ</span>
      </div>
      <div id="liffRouteList" class="price-set-list">
        <div class="empty-state">กำลังโหลด...</div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/core/state.js"></script>
  <script src="js/core/cache.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/modules/nav.js"></script>
  <script src="js/modules/liff-routes-page.js"></script>
  <script src="js/core/zoom-lock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
